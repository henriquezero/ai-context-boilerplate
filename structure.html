<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI context structure — Boilerplate</title>
<style>
  :root{
    --font-sans:'Inter',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    --font-mono:ui-monospace,'SF Mono',Menlo,Consolas,monospace;
    --color-text-primary:#23211d;
    --color-text-secondary:#6f6a62;
    --color-border-secondary:#e3e0d8;
    --color-border-tertiary:#d9d5cc;
    --color-bg-secondary:#faf9f5;
    --page:#f1efe8;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --color-text-primary:#ece9e3;
      --color-text-secondary:#a8a39a;
      --color-border-secondary:#3a3833;
      --color-border-tertiary:#46433d;
      --color-bg-secondary:#26241f;
      --page:#1b1a16;
    }
  }
  *{box-sizing:border-box}
  body{margin:0;padding:32px;background:var(--page);font-family:var(--font-sans);
       display:flex;justify-content:center;align-items:flex-start;min-height:100vh}
  .wrap{width:100%;max-width:1080px}
  svg{width:100%;height:auto;display:block}
  .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;
           clip:rect(0,0,0,0);white-space:nowrap;border:0}
</style>
</head>
<body>
<div class="wrap">
  <h2 class="sr-only">Boilerplate structure: AGENTS.md is the source of truth at the root; five bridge files redirect to it; the ai-context folder holds ARCHITECTURE.md, CONVENTIONS.md, RUNBOOK.md and the rules folder with task-approach, definition-of-done, canonical-files and security.</h2>
  <svg viewBox="0 0 1080 1080" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="ttl desc" font-family="var(--font-sans,'Inter',system-ui,sans-serif)">

      .ctx{fill:#2E7D74;}

    <!-- header -->
    <text x="42" y="68" class="ink" font-size="37" font-weight="800" letter-spacing="-0.5">AI CONTEXT STRUCTURE</text>

    <text x="1040" y="48" class="mut mono" font-size="13" text-anchor="end">ai-context-boilerplate</text>

    <g>

      <text x="500" y="504" font-size="13.5"><tspan class="ctx" font-weight="700">✓ </tspan><tspan class="mut">Loaded by instruction — no auto-load dependency</tspan></text>
      <text x="500" y="523" font-size="13.5"><tspan class="ctx" font-weight="700">✓ </tspan><tspan class="mut">Dense; read once at session start</tspan></text>
    </g>
    <g>
      <rect x="470" y="545" width="570" height="108" rx="14" fill="var(--color-bg-secondary,#faf9f5)" stroke="var(--color-border-secondary,#e3e0d8)" stroke-width="1.5"/>

      <text x="500" y="642" font-size="13.5"><tspan class="ctx" font-weight="700">✓ </tspan><tspan class="mut">Conventions: the project's code patterns</tspan></text>
    </g>
    <g>
      <rect x="470" y="664" width="570" height="108" rx="14" fill="var(--color-bg-secondary,#faf9f5)" stroke="var(--color-border-secondary,#e3e0d8)" stroke-width="1.5"/>
      <rect x="476" y="680" width="6" height="76" rx="3" fill="#2E7D74"/>
      <text x="500" y="698" class="ink" font-size="18" font-weight="700">ai-context/rules/</text>
      <text x="500" y="719" class="ctx" font-size="11" font-weight="700" letter-spacing="1.2">DETAILED BEHAVIOR</text>
      <text x="500" y="742" font-size="12.5"><tspan class="ctx" font-weight="700">✓ </tspan><tspan class="mut mono">task-approach · definition-of-done · canonical-files · security</tspan></text>
      <text x="500" y="761" font-size="13.5"><tspan class="ctx" font-weight="700">✓ </tspan><tspan class="mut">Modular; keeps AGENTS.md lean</tspan></text>

    <g>
      <rect x="470" y="783" width="570" height="108" rx="14" fill="var(--color-bg-secondary,#faf9f5)" stroke="var(--color-border-secondary,#e3e0d8)" stroke-width="1.5"/>
      <rect x="476" y="799" width="6" height="76" rx="3" fill="#2E7D74"/>

      <text x="500" y="880" font-size="13.5"><tspan class="ctx" font-weight="700">✓ </tspan><tspan class="mut">Migrations, seed and environment variables</tspan></text>
    </g>

    <!-- ===== footer legend ===== -->
    <rect x="40" y="958" width="1000" height="86" rx="14" fill="var(--color-bg-secondary,#faf9f5)" stroke="var(--color-border-secondary,#e3e0d8)" stroke-width="1.5"/>
    <g font-size="13.5">
      <circle cx="68" cy="990" r="6" fill="#C25B3F"/>
      <text x="82" y="995" class="mut"><tspan class="ink" font-weight="700">Source of truth</tspan> — every interaction</text>
      <circle cx="406" cy="990" r="6" fill="#8a7f78"/>
      <text x="420" y="995" class="mut"><tspan class="ink" font-weight="700">Bridges</tspan> — redirect to AGENTS.md</text>

      <text x="756" y="995" class="mut"><tspan class="ink" font-weight="700">ai-context layer</tspan> — first interaction</text>

    <text x="68" y="1024" class="mut" font-size="13">Folder and file names in English; prose inside the files follows the team's language. <tspan class="mono ink" font-weight="700">AGENTS.md</tspan> tells the AI to read the <tspan class="mono ink" font-weight="700">ai-context/</tspan> layer.</text>

</html>
